name = "Pine Script"
grammar = "pine_script"
path_suffixes = ["pine", "pinescript"]
scopes = ["source.pine"]
line_comments = ["// "]
tab_size = 4
hard_tabs = false
brackets = [
  { start = "(", end = ")", close = true, newline = false },
  { start = "[", end = "]", close = true, newline = false },
  { start = "{", end = "}", close = true, newline = true },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string"] },
]
